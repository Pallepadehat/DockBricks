name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm install

      - name: macOS signing notice
        if: ${{ matrix.platform == 'macos-latest' }}
        run: |
          echo "macOS builds are smoothest for users when Apple signing/notarization secrets are configured."
          echo "See docs/releasing.md for APPLE_* secret setup."

      - name: Prepare updater signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SIGNING_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is missing."
            exit 1
          fi

          key_file="${RUNNER_TEMP}/tauri-signing.key"
          normalized_key="$(printf '%s' "$SIGNING_KEY" | tr -d '\r')"

          # Support both secret formats:
          # 1) raw key file contents (contains 'untrusted comment')
          # 2) base64-encoded key file
          if [[ "$normalized_key" == *"untrusted comment:"* ]]; then
            printf '%s\n' "$normalized_key" > "$key_file"
          else
            decoded_key="$(node -e 'const s = process.argv[1]; try { process.stdout.write(Buffer.from(s, "base64").toString("utf8")); } catch (_) {}' "$normalized_key")"
            decoded_key="$(printf '%s' "$decoded_key" | tr -d '\r')"
            if [[ "$decoded_key" != *"untrusted comment:"* ]]; then
              echo "TAURI_SIGNING_PRIVATE_KEY is neither a raw minisign key nor valid base64-encoded key content."
              exit 1
            fi
            printf '%s\n' "$decoded_key" > "$key_file"
          fi

          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$key_file" >> "$GITHUB_ENV"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri --
          tagName: __VERSION__
          releaseName: "DockBricks __VERSION__"
          releaseBody: "See the assets below to download this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
